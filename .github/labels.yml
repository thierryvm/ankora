# ── PR-series (which ROADMAP PR) ───────────────────────────────────
- name: 'pr:PR-1'
  color: 'D4C5F9'
  description: 'Belongs to PR-1 (i18n socle)'
- name: 'pr:PR-1bis'
  color: 'D4C5F9'
  description: 'Belongs to PR-1bis (i18n routes privées)'
- name: 'pr:PR-Q'
  color: 'D4C5F9'
  description: 'Belongs to PR-Q (OpenGraph statique)'
- name: 'pr:PR-2'
  color: 'D4C5F9'
  description: 'Belongs to PR-2 (traductions)'
- name: 'pr:PR-3'
  color: 'D4C5F9'
  description: 'Belongs to PR-3 (port mockups React)'
- name: 'pr:PR-B1'
  color: 'D4C5F9'
  description: 'Belongs to PR-B1 (bug reporting MVP)'
- name: 'pr:PR-B2'
  color: 'D4C5F9'
  description: 'Belongs to PR-B2 (admin panel complet)'
- name: 'pr:PR-F'
  color: 'D4C5F9'
