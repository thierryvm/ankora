# Ankora GitHub labels configuration.
# Apply with: pwsh .github/scripts/setup-labels.ps1
# Or manually: gh label create "<name>" --color "<color>" --description "<desc>"

# ── Type (what kind of change) ─────────────────────────────────────
- name: 'type:feat'
  color: '0E8A16'
  description: 'New user-facing feature'
- name: 'type:fix'
  color: 'D73A4A'
  description: 'Bug fix'
- name: 'type:refactor'
  color: '5319E7'
  description: 'Code restructure, no behavior change'
- name: 'type:perf'
  color: 'FBCA04'
  description: 'Performance improvement'
- name: 'type:test'
  color: 'BFD4F2'
  description: 'Tests only'
- name: 'type:docs'
  color: '0075CA'
  description: 'Documentation only'
- name: 'type:chore'
  color: 'C5DEF5'
  description: 'Maintenance (deps, CI, tooling)'
- name: 'type:security'
  color: 'B60205'
  description: 'Security fix'
- name: 'type:pr-task'
  color: '8B4513'
  description: 'Tracking issue for a ROADMAP PR'

# ── Status (where is it in the lifecycle) ──────────────────────────
- name: 'status:todo'
  color: 'CCCCCC'
  description: 'Not started yet'
- name: 'status:in-progress'
  color: 'FEF2C0'
  description: 'Currently being worked on'
- name: 'status:review-needed'
  color: 'F9D0C4'
  description: 'Ready for review'
- name: 'status:changes-requested'
  color: 'E99695'
  description: 'Reviewer has requested changes'
- name: 'status:blocked'
  color: 'E11D21'
  description: 'Blocked by something external'
- name: 'status:ready-to-merge'
  color: '0E8A16'
  description: 'Approved and CI green — ready to merge'

# ── Area (which part of the app) ───────────────────────────────────
- name: 'area:auth'
  color: '1D76DB'
  description: 'Authentication / session'
- name: 'area:onboarding'
  color: '1D76DB'
  description: 'Onboarding flow'
- name: 'area:dashboard'
  color: '1D76DB'
  description: 'Main /app dashboard'
- name: 'area:charges'
  color: '1D76DB'
  description: 'Charges management'
- name: 'area:expenses'
  color: '1D76DB'
  description: 'Expenses tracking'
- name: 'area:settings'
  color: '1D76DB'
  description: 'User settings'
- name: 'area:admin'
  color: '1D76DB'
  description: 'Admin panel (PR-B1/PR-B2)'
- name: 'area:i18n'
  color: '1D76DB'
  description: 'Internationalization'
- name: 'area:domain'
  color: '1D76DB'
  description: 'Pure financial domain'
- name: 'area:supabase'
  color: '1D76DB'
  description: 'Supabase (DB, RLS, Storage, Auth)'
- name: 'area:security'
  color: '1D76DB'
  description: 'Security / middleware / headers'
- name: 'area:gdpr'
  color: '1D76DB'
  description: 'GDPR (consent, export, deletion)'
- name: 'area:pwa'
  color: '1D76DB'
  description: 'PWA / offline / service worker'
- name: 'area:ui'
  color: '1D76DB'
  description: 'UI / design system'
- name: 'area:a11y'
  color: '1D76DB'
  description: 'Accessibility'
- name: 'area:seo'
  color: '1D76DB'
