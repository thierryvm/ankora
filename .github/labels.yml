# ── Priority ────────────────────────────────────────────────────────
- name: 'priority:critical'
  color: 'B60205'
  description: 'Drop everything'
- name: 'priority:high'
  color: 'D93F0B'
  description: 'Next up'
- name: 'priority:medium'
  color: 'FBCA04'
  description: 'Normal queue'
- name: 'priority:low'
  color: '0E8A16'
  description: 'Nice to have'

# ── Misc ────────────────────────────────────────────────────────────
- name: 'triage'
  color: 'D876E3'
  description: 'Needs triage'
- name: 'good-first-issue'
  color: '7057FF'
  description: 'Good for newcomers'
- name: 'help-wanted'
  color: '008672'
  description: 'Extra attention needed'
- name: 'wontfix'
  color: 'FFFFFF'
  description: 'Will not be worked on'
- name: 'duplicate'
  color: 'CFD3D7'
  description: 'Duplicate issue or PR'
- name: 'budget:paid-dep-proposed'
  color: 'B60205'
  description: 'Proposes a paid dependency — requires owner approval'
