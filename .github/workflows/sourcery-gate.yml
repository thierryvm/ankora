name: Sourcery Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  check-sourcery-resolved:
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved Sourcery review threads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Why GraphQL instead of REST /comments:
          # GitHub auto-updates a review comment's `commit_id` to the current HEAD
          # whenever the comment can be re-anchored to a still-existing line. As a
          # result, filtering the REST `/pulls/{n}/comments` endpoint by
          # `commit_id == HEAD_SHA` flags resolved threads as "active" — the REST
          # payload has no `isResolved` flag.
          #
          # GraphQL `pullRequest.reviewThreads` exposes the canonical `isResolved`
          # field that GitHub UI uses to enforce branch protection. We treat a
          # thread as actionable iff:
          #   - the original commenter is `sourcery-ai`
          #   - `isResolved` is false
          #
          # On author login: GraphQL returns "sourcery-ai" (login of the underlying
          # Bot account, no `[bot]` suffix), unlike REST which returns
          # "sourcery-ai[bot]". Verified live on PR #62 — the GraphQL Bot type's
          # .login field omits the `[bot]` decoration.
          #
          # See PR #62 incident report for the bug this replaces.

          owner="${REPOSITORY%/*}"
          name="${REPOSITORY#*/}"

          # Paginate through all reviewThreads (first: 100 per page) to support
          # very large PRs with > 100 threads. Concatenates all pages before
          # filtering for unresolved Sourcery threads.
          query='
            query($owner: String!, $name: String!, $number: Int!, $cursor: String) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(first: 100, after: $cursor) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      isResolved
                      comments(first: 1) {
                        nodes {
                          author { login }
                          path
                          body
                        }
                      }
                    }
                  }
                }
              }
            }
          '

          all_nodes='[]'
          cursor=''
          page=1
          while :; do
            if [ -n "$cursor" ]; then
              response=$(gh api graphql \
                -f query="$query" \
                -F owner="$owner" \
                -F name="$name" \
                -F number="$PR_NUMBER" \
                -F cursor="$cursor")
            else
              response=$(gh api graphql \
                -f query="$query" \
                -F owner="$owner" \
                -F name="$name" \
                -F number="$PR_NUMBER")
            fi

            page_nodes=$(echo "$response" | jq '.data.repository.pullRequest.reviewThreads.nodes')
            all_nodes=$(jq -s '.[0] + .[1]' <(echo "$all_nodes") <(echo "$page_nodes"))

            has_next=$(echo "$response" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(echo "$response" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')

            echo "Fetched page $page (cumulative threads: $(echo "$all_nodes" | jq 'length'))"
            page=$((page + 1))

            [ "$has_next" = "true" ] || break
          done

          # Filter for unresolved Sourcery threads. Guard against empty
          # comments.nodes (defensive — a thread should always have at least one
          # comment, but `length > 0` prevents jq from crashing on edge cases).
          unresolved_filter='
            [.[]
              | select(.comments.nodes | length > 0)
              | select(.comments.nodes[0].author.login == "sourcery-ai")
              | select(.isResolved == false)] | length
          '
          unresolved=$(echo "$all_nodes" | jq "$unresolved_filter")

          echo "Unresolved Sourcery review threads on PR #${PR_NUMBER}: $unresolved"

          if [ "$unresolved" -gt 0 ]; then
            echo "::error::Sourcery has $unresolved unresolved review threads. Resolve them in the PR Files Changed view before merging."
            detail_filter='
              [.[]
                | select(.comments.nodes | length > 0)
                | select(.comments.nodes[0].author.login == "sourcery-ai")
                | select(.isResolved == false)
                | {path: .comments.nodes[0].path, body: .comments.nodes[0].body}]
            '
            echo "$all_nodes" | jq "$detail_filter"
            exit 1
          fi

          echo "✅ No unresolved Sourcery review threads."
