name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:use-server
      - run: npm run typecheck
      - run: npm run test -- --run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'http://localhost:54321' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'dummy-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role' }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.E2E_UPSTASH_URL || 'http://localhost:8079' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.E2E_UPSTASH_TOKEN || 'dummy-token' }}
      INTERNAL_SECRET: ${{ secrets.E2E_INTERNAL_SECRET || 'dummy-secret-at-least-32-characters-long' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build
      - name: Start server
        run: npm run start &
      - name: Wait for server port
        # tcp:3000 avoids flakiness from root-path redirects or transient 500s
        # that would make an HTTP probe fail even when the server is up.
        run: npx wait-on tcp:3000 -t 60000
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Audits the live production deployment only. Previews are SSO-protected
    # and a local build running with dummy Supabase creds returns 500.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Wait for Vercel production deploy
        # Polls the GitHub Deployments API rather than the Vercel API directly.
        # Rationale (PR-QA-1c-0, 4 mai 2026): the previous Vercel-API filter
        # `meta.githubCommitSha == $sha AND target == 'production'` consistently
        # missed the deploy even after Vercel reported it as success — likely a
        # field-naming or target-naming mismatch on Vercel's side. GitHub
        # Deployments API exposes the same data (Vercel pushes to it) and is
        # accessible with the workflow's GITHUB_TOKEN, no extra secrets needed.
        # The deployment status `success` corresponds to Vercel `readyState=READY`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          for i in $(seq 1 60); do
            deployment_id=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/deployments?ref=$COMMIT_SHA&environment=Production&per_page=1" \
              | jq -r '.[0].id // empty') || true
            if [ -n "$deployment_id" ]; then
              state=$(curl -sf \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/deployments/$deployment_id/statuses?per_page=1" \
                | jq -r '.[0].state // empty') || true
              if [ "$state" = "success" ]; then
                echo "Production deploy READY for $COMMIT_SHA (deployment id=$deployment_id)"
                exit 0
              fi
              if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
                echo "Production deploy FAILED for $COMMIT_SHA (state=$state)" >&2
                exit 1
              fi
            fi
            echo "Waiting for Vercel production deploy ($i/60, current state=${state:-pending})…"
            sleep 10
          done
          echo "Timeout: no READY production deploy for $COMMIT_SHA" >&2
          exit 1
      - name: Run Lighthouse against canonical production URL
        # The deployment-specific *.vercel.app hostname is gated by Vercel SSO
        # (Deployment Protection), so Lighthouse hits the login page and every
        # perf/a11y assertion fails. The canonical alias skips the gate.
        run: npm run lhci -- --collect.url="https://ankora-chi.vercel.app/"
