name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'http://localhost:54321' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'dummy-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role' }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.E2E_UPSTASH_URL || 'http://localhost:8079' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.E2E_UPSTASH_TOKEN || 'dummy-token' }}
      INTERNAL_SECRET: ${{ secrets.E2E_INTERNAL_SECRET || 'dummy-secret-at-least-32-characters-long' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build
      - name: Start server
        run: npm run start &
      - name: Wait for server port
        # tcp:3000 avoids flakiness from root-path redirects or transient 500s
        # that would make an HTTP probe fail even when the server is up.
        run: npx wait-on tcp:3000 -t 60000
      - run: npm run e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Audits the live production deployment only. Previews are SSO-protected
    # and a local build running with dummy Supabase creds returns 500.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Wait for Vercel production deploy
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          for i in $(seq 1 60); do
            payload=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&target=production&limit=10") || true
            url=$(echo "$payload" | jq -r --arg sha "$COMMIT_SHA" \
              '.deployments[]? | select(.meta.githubCommitSha == $sha and .readyState == "READY") | .url' | head -n1)
            if [ -n "$url" ] && [ "$url" != "null" ]; then
              echo "url=https://$url" >> "$GITHUB_OUTPUT"
              echo "Production deploy READY: https://$url"
              exit 0
            fi
            echo "Waiting for Vercel production deploy ($i/60)…"
            sleep 10
          done
          echo "Timeout: no READY production deploy for $COMMIT_SHA" >&2
          exit 1
      - name: Run Lighthouse against production
        run: npm run lhci -- --collect.url="${{ steps.vercel.outputs.url }}/"
