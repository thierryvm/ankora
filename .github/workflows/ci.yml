name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:use-server
      - run: npm run typecheck
      - run: npm run test -- --run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # TEMP (PR #196): bumped 30 → 45 to break the cache cold-start vicious cycle.
    # Revert to 30 once a successful cache-hit run is observed on main.
    timeout-minutes: 45
    needs: quality
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'http://localhost:54321' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'dummy-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY || 'dummy-service-role' }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.E2E_UPSTASH_URL || 'http://localhost:8079' }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.E2E_UPSTASH_TOKEN || 'dummy-token' }}
      INTERNAL_SECRET: ${{ secrets.E2E_INTERNAL_SECRET || 'dummy-secret-at-least-32-characters-long' }}
      # Playground route is server-only (no NEXT_PUBLIC_ prefix). Enabled in CI
      # so the smoke E2E `e2e/design-playground.spec.ts` can render the route
      # against the prod build (`npm run build && npm run start`). Production
      # deployments must NOT set this to 'true' unless intentionally exposing
      # the dev-only QA route. Cf. PR-D4-PHASE2-A Task 14 (route guard).
      ANKORA_PLAYGROUND_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Extract Playwright version
        id: playwright-version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-${{ steps.playwright-version.outputs.version }}-
      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if timeout 12m npx playwright install --with-deps chromium webkit; then
              echo "Playwright install succeeded on attempt $attempt"
              exit 0
            fi
            rc=$?
            if [ "$rc" -eq 124 ]; then
              echo "::warning::Attempt $attempt timed out after 12m"
            else
              echo "::warning::Attempt $attempt failed (exit=$rc)"
            fi
            [ "$attempt" -lt 3 ] && sleep 10
          done
          echo "::error::Playwright install failed after 3 attempts"
          exit 1
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if timeout 6m npx playwright install-deps chromium webkit; then
              echo "Playwright system deps installed on attempt $attempt"
              exit 0
            fi
            rc=$?
            if [ "$rc" -eq 124 ]; then
              echo "::warning::Attempt $attempt timed out after 6m"
            else
              echo "::warning::Attempt $attempt failed (exit=$rc)"
            fi
            [ "$attempt" -lt 3 ] && sleep 10
          done
          echo "::error::Playwright system deps install failed after 3 attempts"
          exit 1
      - run: npm run build
      - name: Start server
        run: npm run start &
      - name: Wait for server port
        # tcp:3000 avoids flakiness from root-path redirects or transient 500s
        # that would make an HTTP probe fail even when the server is up.
        run: npx wait-on tcp:3000 -t 60000
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Audits the live production deployment only. Previews are SSO-protected
    # and a local build running with dummy Supabase creds returns 500.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Wait for Vercel production deploy
        # Polls the GitHub Deployments API rather than the Vercel API directly.
        # Rationale (PR-QA-1c-0, 4 mai 2026): the previous Vercel-API filter
        # `meta.githubCommitSha == $sha AND target == 'production'` consistently
        # missed the deploy even after Vercel reported it as success — likely a
        # field-naming or target-naming mismatch on Vercel's side. GitHub
        # Deployments API exposes the same data (Vercel pushes to it) and is
        # accessible with the workflow's GITHUB_TOKEN, no extra secrets needed.
        # The deployment status `success` corresponds to Vercel `readyState=READY`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          for i in $(seq 1 60); do
            # Reset on each iteration so the log line below cannot show a
            # stale value from a previous loop when this iteration finds no
            # deployment yet (Sourcery feedback, PR #110).
            state=""
            deployment_id=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/deployments?ref=$COMMIT_SHA&environment=Production&per_page=1" \
              | jq -r '.[0].id // empty') || true
            if [ -n "$deployment_id" ]; then
              state=$(curl -sf \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/deployments/$deployment_id/statuses?per_page=1" \
                | jq -r '.[0].state // empty') || true
              if [ "$state" = "success" ]; then
                echo "Production deploy succeeded for $COMMIT_SHA (deployment id=$deployment_id)"
                exit 0
              fi
              if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
                echo "Production deploy FAILED for $COMMIT_SHA (state=$state)" >&2
                exit 1
              fi
            fi
            echo "Waiting for production deploy ($i/60, current state=${state:-pending})…"
            sleep 10
          done
          echo "Timeout: no production deployment reached state=success for $COMMIT_SHA" >&2
          exit 1
      - name: Run Lighthouse against canonical production URL
        # The deployment-specific *.vercel.app hostname is gated by Vercel SSO
        # (Deployment Protection), so Lighthouse hits the login page and every
        # perf/a11y assertion fails. The canonical alias skips the gate.
        run: npm run lhci -- --collect.url="https://ankora-chi.vercel.app/"
