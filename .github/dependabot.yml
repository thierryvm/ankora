version: 2

# ---------- Dependabot policy (Ankora) ----------
# Status : PAUSED for routine bumps until V1.0 release window stabilizes.
# Security advisories remain active (Dependabot continues to detect vulns
# but does NOT open routine version-bump PRs while open-pull-requests-limit=0).
# Re-enable post-V1.0 by setting limits back to 10 (npm) and 5 (github-actions).
# Decision @cowork+@thierry 2026-05-08 : avoid lockfile churn during PR-D4-PHASE2
# atoms integration + PR-D5 backend tracking paiements.

updates:
  # ---------- npm dependencies (PAUSED) ----------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group minor + patch updates by ecosystem to reduce PR noise.
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
        update-types:
          - "minor"
          - "patch"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      supabase:
        patterns:
          - "@supabase/*"
          - "supabase"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "prettier-plugin-tailwindcss"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "playwright"
          - "@testing-library/*"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"
      lint-format:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "prettier"
          - "husky"
          - "lint-staged"
          - "@commitlint/*"
        update-types:
          - "minor"
          - "patch"
      # Major bumps stay individual to allow careful review.

  # ---------- GitHub Actions (PAUSED) ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
